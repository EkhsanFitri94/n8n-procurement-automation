services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./.n8n:/home/node/.n8n
      - ./workflows:/workflows
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://127.0.0.1:5678\",res=>process.exit(res.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
